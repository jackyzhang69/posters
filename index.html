<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jacky's AI Workshop</title>
    <style>
        :root {
            --theme-dark: #001238;
            --theme-navy: #001944;
            --theme-blue: #00265a;
            --accent-gold: #f1c40f;
            --accent-blue: #3498db;
            --text-light: #ffffff;
            --text-grey: #aab7c4;
            --sidebar-width: 280px;
            --sidebar-mini-width: 64px;
            --header-height: 72px;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', 'PingFang SC', system-ui, sans-serif;
            overflow: hidden;
            background-color: #f4f6f9;
        }

        /* --- Header Design --- */
        .top-header {
            height: var(--header-height);
            background: linear-gradient(135deg, var(--theme-dark) 0%, var(--theme-navy) 100%);
            color: var(--text-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            position: relative;
            z-index: 20;
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
            /* Subtle bottom border accent */
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .top-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-gold), var(--accent-blue));
        }

        .brand-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .brand-logo-icon {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-gold);
        }

        .brand-text h1 {
            margin: 0;
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            line-height: 1.1;
        }

        .brand-text h1 .highlight {
            color: var(--accent-gold);
        }

        .brand-text .slogan {
            margin: 4px 0 0;
            font-size: 0.8rem;
            color: var(--text-grey);
            font-weight: 300;
            letter-spacing: 1px;
        }

        .profile-group {
            text-align: right;
            border-left: 1px solid rgba(255,255,255,0.1);
            padding-left: 20px;
        }

        .profile-name {
            display: block;
            font-weight: 600;
            color: #fff;
            font-size: 0.95rem;
        }

        .profile-role {
            display: block;
            font-size: 0.75rem;
            color: var(--accent-blue);
            margin-top: 2px;
        }

        /* --- Layout --- */
        .layout-container {
            display: flex;
            height: calc(100vh - var(--header-height));
            position: relative;
        }

        /* --- Sidebar --- */
        .sidebar {
            width: var(--sidebar-width);
            background-color: #fff;
            border-right: 1px solid #e1e4e8;
            display: flex;
            flex-direction: column;
            transition: width 0.4s cubic-bezier(0.2, 0, 0, 1);
            position: relative;
            flex-shrink: 0;
            z-index: 10;
        }

        .sidebar.collapsed {
            width: var(--sidebar-mini-width);
        }

        /* Toggle Button on the Edge */
        .sidebar-toggle {
            position: absolute;
            top: 50%;
            right: -12px; /* Stick out half way */
            width: 24px;
            height: 24px;
            background: #fff;
            border: 1px solid #d1d5db;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #555;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            z-index: 50;
            transform: translateY(-50%);
            transition: transform 0.3s, background 0.2s;
        }

        .sidebar-toggle:hover {
            background: var(--accent-blue);
            color: #fff;
            border-color: var(--accent-blue);
        }

        .sidebar-toggle svg {
            width: 14px;
            height: 14px;
            transition: transform 0.4s;
        }

        /* Rotate arrow when collapsed */
        .sidebar.collapsed .sidebar-toggle svg {
            transform: rotate(180deg);
        }

        /* Nav Menu */
        .nav-menu {
            list-style: none;
            padding: 15px 10px;
            margin: 0;
            overflow-x: hidden;
            overflow-y: auto;
        }

        .nav-header {
            padding: 0 15px 15px;
            font-size: 0.75rem;
            font-weight: 700;
            color: #95a5a6;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
            transition: opacity 0.2s;
        }

        .sidebar.collapsed .nav-header {
            opacity: 0;
            pointer-events: none;
        }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 12px;
            border-radius: 8px;
            text-decoration: none;
            color: #4a5568;
            transition: all 0.2s ease;
            margin-bottom: 4px;
            position: relative;
            height: 24px; /* Fixed height context */
        }

        .nav-link:hover {
            background-color: #f0f4f8;
            color: var(--theme-blue);
        }

        .nav-link.active {
            background-color: rgba(52, 152, 219, 0.1);
            color: var(--theme-blue);
        }

        /* Icon Style */
        .nav-icon {
            min-width: 20px; /* Fixed width for icon */
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            color: #a0aec0;
            transition: color 0.2s;
        }

        .nav-link:hover .nav-icon, .nav-link.active .nav-icon {
            color: var(--accent-blue);
        }

        .nav-text {
            white-space: nowrap;
            font-size: 0.95rem;
            opacity: 1;
            transition: opacity 0.2s;
        }

        .nav-date {
            font-size: 0.75rem;
            color: #cbd5e0;
            margin-left: auto; /* Push to right */
        }

        /* Collapsed State Styles */
        .sidebar.collapsed .nav-text,
        .sidebar.collapsed .nav-date {
            opacity: 0;
            width: 0;
            display: none;
        }

        .sidebar.collapsed .nav-link {
            justify-content: center;
            padding: 12px 0;
        }

        .sidebar.collapsed .nav-icon {
            margin-right: 0;
            width: 24px;
            height: 24px;
        }

        /* Tooltip for Collapsed Mode */
        .nav-link[data-title]:hover::after {
            content: attr(data-title);
            position: absolute;
            left: 100%;
            top: 50%;
            transform: translateY(-50%);
            background: var(--theme-dark);
            color: #fff;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.85rem;
            white-space: nowrap;
            margin-left: 10px;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* Only show tooltip when collapsed */
        .sidebar.collapsed .nav-link[data-title]:hover::after {
            opacity: 1;
            transition: opacity 0.2s 0.1s; /* Delay */
        }

        /* Content Area */
        .content-area {
            flex-grow: 1;
            background-color: #f4f6f9;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .profile-group { display: none; }
            
            .sidebar {
                position: absolute;
                height: 100%;
                transform: translateX(-100%); /* Hidden by default on mobile */
                width: var(--sidebar-width) !important; /* No mini mode on mobile */
            }
            
            .sidebar.open {
                transform: translateX(0);
            }
            
            .sidebar-toggle {
                /* On mobile, maybe hide the edge toggle and use a header button instead, 
                   but keeping it simple for now */
                display: none; 
            }
            
            /* Add a simple hamburger in header for mobile only */
            .mobile-menu-btn {
                display: block !important;
            }
        }
        
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            margin-right: 15px;
            cursor: pointer;
        }

    </style>
</head>
<body>

    <!-- Header -->
    <header class="top-header">
        <div class="brand-group">
            <button class="mobile-menu-btn" onclick="toggleMobileMenu()">☰</button>
            
            <div class="brand-logo-icon">
                <!-- Simple SVG Logo Placeholder -->
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
            </div>
            <div class="brand-text">
                <h1>Jacky's <span class="highlight">AI</span> Workshop</h1>
                <p class="slogan">分享 AI 实战经验</p>
            </div>
        </div>

        <div class="profile-group">
            <span class="profile-name">Jacky Zhang</span>
            <span class="profile-role">AI 架构师 & 培训师</span>
        </div>
    </header>

    <div class="layout-container">
        
        <!-- Sidebar -->
        <aside class="sidebar collapsed" id="sidebar">
            <!-- Edge Toggle Button (Chevron) -->
            <div class="sidebar-toggle" onclick="toggleSidebar()" title="Collapse/Expand">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </div>

            <div class="nav-menu">
                <div class="nav-header">最近更新</div>
                
                <!-- Post Item 1 -->
                <a href="posts/ai-pro-bootcamp2.html" target="content-frame" class="nav-link active" onclick="selectPost(this)" data-title="AI Pro Bootcamp 2.0 (2025-12-01)">
                    <div class="nav-icon">
                        <!-- Document Icon -->
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    </div>
                    <span class="nav-text">AI Pro Bootcamp 2.0</span>
                    <!-- Date only shown in expanded mode -->
                    <!-- <span class="nav-date">12/01</span> --> 
                </a>

                <!-- Example of another item -->
                <!-- 
                <a href="#" class="nav-link" data-title="示例文章标题">
                    <div class="nav-icon">
                        <svg ...></svg>
                    </div>
                    <span class="nav-text">示例文章标题</span>
                </a> 
                -->
            </div>
        </aside>

        <!-- Content -->
        <main class="content-area">
            <iframe src="posts/ai-pro-bootcamp2.html" name="content-frame" title="Main Content"></iframe>
        </main>

    </div>

    <script>
        const sidebar = document.getElementById('sidebar');
        
        // Desktop Toggle (Collapse/Mini Mode)
        function toggleSidebar() {
            sidebar.classList.toggle('collapsed');
        }

        // Mobile Toggle (Off-canvas)
        function toggleMobileMenu() {
            sidebar.classList.toggle('open');
        }

        // Active State
        function selectPost(el) {
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
            el.classList.add('active');
            
            // Close mobile menu if open
            if (window.innerWidth <= 768) {
                sidebar.classList.remove('open');
            }
        }
    </script>
</body>
</html>
